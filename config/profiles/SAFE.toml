[profile]
name = "SAFE"
home_timezone = "Pacific/Auckland"
base_currency = "NZD"

[ui]
language = "zh"

[signals]
primary = "SPY"
confirm = [ "QQQ", "DIA",]
volatility = "^VIX"
defensive = [ "SGOV", "GLD", "TLT",]
price_field = "Close"

[trend]
short_window = 20
medium_window = 50
long_window = 120
confirmation_days = 2

[vix]
[[vix.rules]]
label = "low"
max_exclusive = 25.0
multiplier = 4.0

[[vix.rules]]
label = "normal"
min_inclusive = 25.0
max_exclusive = 30.0
multiplier = 1.0

[[vix.rules]]
label = "danger"
min_inclusive = 30.0
max_exclusive = 40.0
multiplier = 0.5

[[vix.rules]]
label = "crisis"
min_inclusive = 40.0
multiplier = 0.2

[position]
min_exposure = 0.0
max_exposure = 300.0
rebalance_threshold = 30.0
max_rebalances_per_week = 1
fixed_exposure_tiers_enabled = false
fixed_exposure_tiers = [ 0.0, 100.0, 300.0,]

# ── 模块开关 ──
composite_module_enabled = true
simple_module_enabled = false

# ── 简单模块 ──
simple_module_fast_ma_window = 120
simple_module_slow_ma_window = 200
simple_module_threshold_pct = 2.0
simple_module_off_exposure = 0.0
simple_module_on_exposure = 300.0

# ── 极端风险模块 ──
extreme_risk_cap_enabled = false
extreme_risk_ma_window = 200
extreme_risk_threshold_pct = 2.0
extreme_risk_min_exposure = 0.0

[execution]
mode = "manual"
default_market = "us"
core_asset = "USF.NZX"
asx_core_asset = "IVV.AX"
cash_asset = "cash"
defensive_asset = "NZC.NZ"
nz_defensive_asset = "NZC.NZ"
au_defensive_asset = "BILL.AX"
leveraged_asset = "SPXL"
leveraged_alternative = "UPRO"
leverage_multiple = 3.0
allow_leverage = true
limit_foreign_assets_nzd_value = false
foreign_assets_nzd_limit = 50000.0
leverage_only_when_vix_below = 30.0
clear_leverage_when_vix_at_or_above = 40.0

[backtest]
start = "2010-01-01"
initial_capital = 1000000.0
weekly_contribution = 0.0
annual_cash_return = 0.0
annual_leveraged_fee = 0.009
use_adjusted_close = true
signal_effective_next_day = true
execution_timing = "next_session"

[trend.exposure]
below_long = 0.0
above_long = 60.0
medium_above_long = 88.0
short_above_medium_above_long = 100.0

[markets.us]
timezone = "America/New_York"
regular_open = "09:30"
regular_close = "16:00"

[markets.asx]
timezone = "Australia/Sydney"
regular_open = "10:00"
regular_close = "16:00"

[markets.nzx]
timezone = "Pacific/Auckland"
regular_open = "10:00"
regular_close = "16:45"
