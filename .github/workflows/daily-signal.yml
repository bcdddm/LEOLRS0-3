name: Daily Signal

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC. Run at the NZST/NZDT and EST/EDT candidates,
    # then gate below so messages send one hour before each market close:
    # 15:45 Pacific/Auckland and 15:00 America/New_York year-round.
    - cron: "45 2,3 * * *"
    - cron: "0 20,21 * * *"

jobs:
  send-daily-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Check market delivery time
        id: delivery-time
        run: |
          nz_time="$(TZ=Pacific/Auckland date +%H:%M)"
          ny_time="$(TZ=America/New_York date +%H:%M)"
          echo "nz_time=$nz_time" >> "$GITHUB_OUTPUT"
          echo "ny_time=$ny_time" >> "$GITHUB_OUTPUT"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "$nz_time" == "15:45" || "$ny_time" == "15:00" ]]; then
            echo "should_send=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_send=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        if: steps.delivery-time.outputs.should_send == 'true'
        uses: actions/checkout@v5

      - name: Set up Python
        if: steps.delivery-time.outputs.should_send == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: steps.delivery-time.outputs.should_send == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run daily signal
        if: steps.delivery-time.outputs.should_send == 'true'
        run: |
          python -m trend_system daily --config config/profiles/Leo.toml > daily-report.txt
          cat daily-report.txt

      - name: Send Telegram message
        if: steps.delivery-time.outputs.should_send == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m trend_system.notify --message-file daily-report.txt
