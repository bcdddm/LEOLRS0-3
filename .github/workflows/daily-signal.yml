name: Daily Signal

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC. Run at both NZST and NZDT candidates, then gate
    # below so messages send at 08:30 and 20:30 Pacific/Auckland year-round.
    - cron: "30 7,8,19,20 * * *"

jobs:
  send-daily-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Check New Zealand delivery time
        id: delivery-time
        run: |
          local_time="$(TZ=Pacific/Auckland date +%H:%M)"
          echo "local_time=$local_time" >> "$GITHUB_OUTPUT"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "$local_time" == "08:30" || "$local_time" == "20:30" ]]; then
            echo "should_send=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_send=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        if: steps.delivery-time.outputs.should_send == 'true'
        uses: actions/checkout@v5

      - name: Set up Python
        if: steps.delivery-time.outputs.should_send == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: steps.delivery-time.outputs.should_send == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run daily signal
        if: steps.delivery-time.outputs.should_send == 'true'
        run: |
          python -m trend_system daily --config config/settings.toml > daily-report.txt
          cat daily-report.txt

      - name: Send Telegram message
        if: steps.delivery-time.outputs.should_send == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m trend_system.notify --message-file daily-report.txt
